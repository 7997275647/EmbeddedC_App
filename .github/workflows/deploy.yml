name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    # Grant write permissions for GitHub Pages deployment
    permissions:
      contents: write
      pages: write

    steps:
    # Checkout the code
    - name: Checkout code
      uses: actions/checkout@v3

    # Deploy to GitHub Pages
    - name: Deploy to GitHub Pages
      uses: peaceiris/actions-gh-pages@v3
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: ./
        cname: # Optional: add your custom domain here (e.g., embeddedc.yourdomain.com)
        exclude_assets: 'server.js,package.json,package-lock.json,node_modules,.github,temp'
