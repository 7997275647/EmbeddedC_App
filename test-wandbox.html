<!DOCTYPE html>
<html>
<head>
    <title>Wandbox API Test</title>
    <style>
        body { font-family: monospace; margin: 20px; }
        textarea { width: 100%; height: 200px; }
        button { padding: 10px 20px; font-size: 16px; }
        pre { background: #f0f0f0; padding: 10px; overflow-x: auto; }
    </style>
</head>
<body>
    <h1>Wandbox API Test</h1>
    
    <textarea id="code">#include <stdio.h>
int main() {
    printf("Hello, Embedded World!\n");
    return 0;
}</textarea>
    
    <br><button onclick="testWandbox()">Test Wandbox API</button>
    
    <h2>Response:</h2>
    <pre id="response">Click button to test...</pre>
    
    <script>
        async function testWandbox() {
            const code = document.getElementById('code').value;
            const responseDiv = document.getElementById('response');
            
            responseDiv.textContent = 'Testing...';
            
            try {
                console.log('Sending request to Wandbox...');
                const payload = {
                    code: code,
                    language: 'c',
                    compiler: 'gcc-head'
                };
                
                const response = await fetch('https://wandbox.org/api/compile.json', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(payload),
                    mode: 'cors'
                });
                
                console.log('Response status:', response.status);
                
                if (!response.ok) {
                    responseDiv.textContent = `Error: ${response.status} ${response.statusText}`;
                    return;
                }
                
                const result = await response.json();
                console.log('API Result:', result);
                
                const output = `Status: ${response.status}
Compiler: ${result.compiler}
Code: ${result.code}
Stdout: ${result.stdout}
Stderr: ${result.stderr}
Compiler Error: ${result.compiler_error || 'none'}

Full Response: ${JSON.stringify(result, null, 2)}`;
                
                responseDiv.textContent = output;
            } catch (error) {
                console.error('Error:', error);
                responseDiv.textContent = `Error: ${error.message}`;
            }
        }
    </script>
</body>
</html>
